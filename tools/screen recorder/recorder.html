<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder - Project Toolsuite</title>
    <meta name="description" content="Record your screen directly from the browser.">
    <meta property="og:title" content="Screen Recorder - Project Toolsuite">
    <meta property="og:description" content="Record your screen directly from the browser.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Screen Recorder - Project Toolsuite">
    <meta name="twitter:description" content="Record your screen directly from the browser.">
    <meta name="twitter:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">

    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <style>
        :root {
            --video-bg: #000000;
            --danger: #dd0000;
            --success: #008000;
            --success-border: #006400;
            --success-panel-bg: #e8f5e9;
            --record-bg: #000000;
            --record-text: #ffffff;
        }

        body.dark-mode {
            --success-panel-bg: #1a3320;
            --record-bg: #f0f0f0;
            --record-text: #1b1a1a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 20px;
            line-height: 1.7;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 3px solid var(--border);
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .top-bar a {
            text-decoration: none;
            color: var(--text);
            font-weight: bold;
            border-bottom: 1px dotted var(--border);
        }

        .top-bar a:hover {
            background: var(--text);
            color: var(--bg);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border: 3px solid var(--border);
            margin-top: 20px;
            background: var(--video-bg);
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            max-height: 70vh;
        }

        .controls-zone {
            margin: 25px 0;
            padding: 20px;
            border: 2px solid var(--border);
            background: var(--tag-bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .controls-zone.success-panel {
            background: var(--success-panel-bg);
            border-color: var(--success);
        }

        .options-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 10px;
            border: 2px solid transparent;
        }

        label:hover {
            border: 2px solid var(--border);
        }

        input[type="checkbox"] {
            transform: scale(1.5);
            accent-color: var(--text);
        }

        button {
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 12px 24px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            box-shadow: 4px 4px 0 var(--border);
            transition: transform 0.1s, box-shadow 0.1s, background 0.15s, color 0.15s;
        }

        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--border);
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--border);
        }

        .btn-record {
            background: var(--record-bg);
            color: var(--record-text);
        }

        .btn-stop {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
            display: none;
        }

        .btn-download {
            background: var(--success);
            color: #fff;
            border-color: var(--success-border);
        }

        .rec-indicator {
            color: var(--danger);
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        .note-text {
            font-size: 0.9rem;
            margin: 0;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="../../index.html">&larr; BACK</a>
            <h1 style="margin: 0;">Screen Recorder</h1>
            <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn" style="position: static; box-shadow: 4px 4px 0 var(--border);">DARK MODE</button>
        </div>
        <p>Private, offline screen recording. No upload, no watermark.</p>

        <div class="controls-zone" id="setupPanel">
            <div class="options-row">
                <label>
                    <input type="checkbox" id="micToggle">
                    Record Microphone
                </label>
                <label>
                    <input type="checkbox" id="audioToggle" checked>
                    Include System Audio
                </label>
            </div>

            <p class="note-text">
                (Note: You must also select "Share Audio" in the browser popup)
            </p>

            <button onclick="startRecording()" class="btn-record" id="startBtn">
                Start Recording
            </button>

            <button onclick="stopRecording()" class="btn-stop" id="stopBtn">
                Stop Recording
            </button>

            <div id="recordingStatus" class="hidden">
                <span class="rec-indicator">● REC</span>
                <span id="timerDisplay" style="font-weight: bold; margin-left: 10px;">00:00</span>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="previewVideo" autoplay muted playsinline></video>
            <video id="playbackVideo" controls class="hidden"></video>
        </div>

        <div id="downloadPanel" class="controls-zone success-panel hidden">
            <h3>Recording Complete!</h3>
            <div class="options-row">
                <button onclick="downloadVideo()" class="btn-download">Download .WebM</button>
                <button onclick="resetRecorder()">New Recording</button>
            </div>
        </div>
    </div>

    <script src="recorder.js"></script>
</body>
</html>
