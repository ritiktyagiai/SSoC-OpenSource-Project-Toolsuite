<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Synthesizer & Sequencer</title>
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <style>
        :root {
            --accent-color: #00d2ff;
            --active-step: #ff0055;
            --note-bg: #e3e3e3;
            --input-bg: #ffffff;
            --scope-bg: #f5f5f5;
            --label-muted: #666666;
            --grid-line: #cccccc;
        }

        body.dark-mode {
            --note-bg: #444444;
            --input-bg: #252525;
            --scope-bg: #111111;
            --label-muted: #aaaaaa;
            --grid-line: #444;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .page-header {
            position: relative;
            width: 100%;
            max-width: 800px;
            border-bottom: 4px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 20px;
            text-align: center;
            padding-right: 160px;
        }

        h1 { margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--tag-bg);
            padding: 15px 30px;
            border: 2px solid var(--border);
            border-radius: 0;
            box-shadow: 4px 4px 0px var(--border);
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        #btn-play { background-color: var(--success, #4caf50); color: white; }
        #btn-stop { background-color: #f44336; color: white; }
        #btn-clear { background-color: var(--label-muted); color: white; }

        select, input[type=number] {
            background: var(--input-bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 8px;
            border-radius: 0;
            font-family: inherit;
        }

        .sequencer-container {
            display: flex;
            gap: 10px;
        }

        .labels {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding-right: 10px;
            font-family: monospace;
            color: var(--label-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
        }

        .step-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .note-btn {
            width: 30px;
            height: 30px;
            background-color: var(--note-bg);
            border: 2px solid var(--border);
            border-radius: 0;
            cursor: pointer;
            transition: 0.1s;
        }

        .note-btn:hover { border-color: var(--accent-color); }
        .note-btn.active { background-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); border-color: var(--text); }
        
        .step-col.playing .note-btn { opacity: 0.8; border-color: var(--text); }
        .step-col.playing { background-color: var(--tag-bg); border-radius: 0; }

        canvas {
            width: 100%;
            max-width: 800px;
            height: 100px;
            background: var(--scope-bg);
            border-radius: 0;
            margin-top: 30px;
            border: 2px solid var(--border);
        }
    </style>
</head>
<body>

    <header class="page-header">
        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button>
        <h1>WASM Synthesizer</h1>
    </header>
    
    <div class="controls">
        <button id="btn-play">▶ Play</button>
        <button id="btn-stop">⏹ Stop</button>
        
        <div>
            <label>Waveform:</label>
            <select id="waveform-select">
                <option value="sine">Sine</option>
                <option value="square">Square</option>
                <option value="sawtooth">Sawtooth</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>

        <div>
            <label>BPM:</label>
            <input type="number" id="bpm-input" value="120" min="40" max="240" style="width: 60px;">
        </div>

        <button id="btn-clear">Clear Grid</button>
    </div>

    <div class="sequencer-container">
        <div class="labels" id="note-labels">
            </div>
        <div class="grid" id="sequencer-grid">
            </div>
    </div>

    <canvas id="scope"></canvas>

    <script src="synth-logic.js"></script>
</body>
</html>
