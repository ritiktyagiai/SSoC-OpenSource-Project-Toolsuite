<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure JWT Debugger - Offline</title>

    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <style>
        :root {
            --accent-color: #007acc;
            --key-color: #9cdcfe;
            --string-color: #ce9178;
            --number-color: #b5cea8;
            --bool-color: #569cd6;
            --muted: #666666;
            --meta-tag-bg: #e8e8e8;
            --meta-value: #555555;
        }

        body.dark-mode {
            --muted: #aaaaaa;
            --meta-tag-bg: #3c3c3c;
            --meta-value: #cccccc;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 20px;
            line-height: 1.7;
            max-width: 880px;
            margin: 32px auto;
            padding: 24px;
            transition: background-color 0.3s, color 0.3s;
        }

        .page-header {
            position: relative;
            border-bottom: 4px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 8px;
            padding-right: 160px;
        }

        h1 { margin-bottom: 10px; font-size: 1.5rem; text-transform: uppercase; }
        p.subtitle { color: var(--muted); margin-top: -10px; font-size: 0.9rem; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .input-section {
            grid-column: 1 / -1;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--tag-bg);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 0;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            resize: vertical;
        }

        textarea:focus { outline: 2px solid var(--accent-color); border-color: transparent; }

        .panel {
            background-color: var(--tag-bg);
            border-radius: 0;
            padding: 15px;
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .panel h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.95rem;
        }

        .key { color: var(--key-color); }
        .string { color: var(--string-color); }
        .number { color: var(--number-color); }
        .boolean { color: var(--bool-color); }
        .null { color: #dcdcaa; }

        .meta-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid var(--border);
            font-size: 0.9rem;
        }
        .meta-tag {
            display: inline-block;
            background: var(--meta-tag-bg);
            padding: 4px 8px;
            border-radius: 0;
            border: 1px solid var(--border);
            margin-right: 10px;
            margin-bottom: 5px;
            color: var(--text);
        }
        .meta-value { color: var(--meta-value); }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button>
        <h1>Secure JWT Debugger</h1>
        <p class="subtitle">Paste your token below. Processing is done 100% offline in your browser.</p>
    </header>

    <div class="container">
        <div class="input-section">
            <textarea id="jwt-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>

        <div class="panel">
            <h3>Header</h3>
            <pre id="header-output"><span style="color:#666">// Waiting for input...</span></pre>
        </div>

        <div class="panel">
            <h3>Payload</h3>
            <pre id="payload-output"><span style="color:#666">// Waiting for input...</span></pre>
            <div id="meta-output" class="meta-info" style="display:none;"></div>
        </div>
    </div>

    <script src="jwt-logic.js"></script>
</body>
</html>
