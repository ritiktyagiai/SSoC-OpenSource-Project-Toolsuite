<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener - Project Toolsuite</title>
    <meta name="description" content="Quickly shorten long URLs for easy sharing.">
    <meta property="og:title" content="URL Shortener - Project Toolsuite">
    <meta property="og:description" content="Quickly shorten long URLs for easy sharing.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="URL Shortener - Project Toolsuite">
    <meta name="twitter:description" content="Quickly shorten long URLs for easy sharing.">
    <meta name="twitter:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">

    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>
    <style>
      :root {
        --font-main: "Courier New", Courier, monospace;
        --text-sm: 0.85rem;
        --text-md: 1rem;
        --text-lg: 1.2rem;
        --text-xl: 2rem;
        --space-xs: 6px;
        --space-sm: 12px;
        --space-md: 20px;
        --space-lg: 32px;
        --space-xl: 48px;
        --focus-border: #555555;
        --focus-bg: #f5f5f5;
        --muted: #666666;
      }

      body.dark-mode {
        --focus-border: #aaaaaa;
        --focus-bg: #333333;
        --muted: #aaaaaa;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.7;
        max-width: 800px;
        margin: var(--space-xl) auto;
        padding: var(--space-md);
        transition: background-color 0.3s, color 0.3s;
      }

      header {
        border-bottom: 4px solid var(--border);
        margin-bottom: var(--space-lg);
        padding-bottom: var(--space-sm);
        position: relative;
        padding-right: 160px;
      }

      h1 {
        font-size: var(--text-xl);
        text-transform: uppercase;
        margin: 0;
      }

      .input-box {
        width: 100%;
        padding: var(--space-sm);
        border: 2px solid var(--border);
        font-family: var(--font-main);
        font-size: var(--text-md);
        box-sizing: border-box;
        margin-bottom: var(--space-sm);
        background: var(--tag-bg);
        color: var(--text);
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
      }

      .input-box:focus {
        outline: none;
        background-color: var(--focus-bg);
        box-shadow: inset 0 0 0 1px var(--border);
      }

      button {
        font-family: var(--font-main);
        background-color: var(--bg);
        color: var(--text);
        border: 2px solid var(--border);
        padding: 12px 24px;
        text-transform: uppercase;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.15s ease;
        box-shadow: 4px 4px 0 var(--border);
      }

      button:hover {
        background-color: var(--text);
        color: var(--bg);
        transform: translateY(-2px);
      }

      button:active {
        transform: scale(0.96);
      }

      .copy-btn {
        margin-top: var(--space-sm);
      }

      #result-container {
        display: none;
        margin-top: var(--space-lg);
        padding: var(--space-md);
        border: 2px dashed var(--border);
        background: var(--tag-bg);
      }

      #shortUrl {
        font-weight: bold;
        font-size: var(--text-lg);
        word-break: break-all;
        margin-top: var(--space-sm);
        display: block;
      }

      #status {
        margin-top: var(--space-sm);
        padding: var(--space-xs) var(--space-sm);
        border: 1px dashed var(--border);
        display: inline-block;
        font-size: var(--text-sm);
        background: var(--tag-bg);
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: var(--space-lg) 0;
      }

      a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px dotted var(--border);
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      a:hover {
        background-color: var(--text);
        color: var(--bg);
      }

      footer {
        margin-top: var(--space-xl);
        font-size: var(--text-sm);
      }

      @media (max-width: 600px) {
        body {
          margin: var(--space-md) auto;
          padding: var(--space-sm);
        }

        header {
          padding-right: 0;
          padding-top: 56px;
        }

        .dark-mode-toggle {
          top: auto;
          bottom: 100%;
          margin-bottom: 8px;
        }

        h1 {
          font-size: 1.6rem;
        }

        #shortUrl {
          font-size: 1.05rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <button class="dark-mode-toggle" onclick="toggleTheme()" id="themeBtn">DARK MODE</button>
      <h1>URL Shortener</h1>
      <p>
        Turn long, messy links into clean, shareable ones instantly. No
        tracking, no accounts.
      </p>
    </header>

    <main>
      <section>
        <input
          type="url"
          id="longUrl"
          class="input-box"
          placeholder="https://very-long-link.com/with/lots/of/parameters/12345"
        />
        <button id="shortenBtn">Shorten Link</button>

        <div id="result-container">
          <p style="margin: 0; text-transform: uppercase; font-size: 0.8rem">
            Your shortened link:
          </p>
          <div id="shortUrl"></div>
          <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
        </div>

        <div style="display: block">
          <p id="status">System Ready: Waiting for URL...</p>
        </div>
      </section>
    </main>

    <footer>
      <hr />
      <p><a href="https://project-toolsuite.vercel.app">← Back to Home</a></p>
    </footer>

    <script src="shorten-logic.js"></script>
  </body>
</html>
